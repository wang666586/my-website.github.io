<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时验证码接收</title>
    <style>
        *{margin: 0;padding: 0;box-sizing: border-box;}
        body{
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f5f7fa;
            font-family: sans-serif;
        }
        .box{
            padding: 60px 100px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h2{
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }
        #yzm{
            font-size: 48px;
            font-weight: bold;
            color: #1976d2;
            letter-spacing: 6px;
        }
        .tip{
            margin-top: 20px;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>最新收到验证码</h2>
        <div id="yzm">等待接收...</div>
        <div class="tip">3秒自动刷新 | 公网实时同步</div>
    </div>

    <script>
        // 你的公网数据接口
        const API_URL = "https://jsonbin.org/demo-code/yzm-data";
        const yzmDom = document.getElementById("yzm");

        // 获取最新验证码
        async function getVerifyCode(){
            try{
                const res = await fetch(API_URL);
                const data = await res.json();
                if(data.code){
                    yzmDom.innerText = data.code;
                }
            }catch(e){
                yzmDom.innerText = "获取失败";
            }
        }
        // 3秒刷新一次
        setInterval(getVerifyCode,3000);
        getVerifyCode();
    </script>
</body>
</html>

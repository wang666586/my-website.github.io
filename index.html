<!DOCTYPE html>
<html lang="zh-CN">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        /* 密码弹窗遮罩层 */
        .password-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Inter', Roboto, sans-serif;
        }
        .password-modal {
            background: white;
            border-radius: 2rem;
            width: 90%;
            max-width: 400px;
            padding: 2rem 1.5rem;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            animation: fadeInUp 0.25s ease;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .password-modal h3 {
            font-size: 1.6rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #1f5e7e, #3083a3);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .password-modal p {
            color: #5c7f94;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }
        .password-input {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            border: 1px solid #cbdbe0;
            border-radius: 60px;
            outline: none;
            transition: 0.2s;
            font-family: monospace;
            margin-bottom: 1rem;
        }
        .password-input:focus {
            border-color: #3083a3;
            box-shadow: 0 0 0 3px rgba(48,131,163,0.2);
        }
        .password-btn {
            background: #1f6e8c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }
        .password-btn:hover {
            background: #0d5975;
        }
        .error-msg {
            color: #d9534f;
            font-size: 0.75rem;
            margin-top: 10px;
            min-height: 28px;
        }
        /* 主内容默认隐藏 */
        .main-content {
            display: none;
        }
        .main-content.visible {
            display: block;
        }
        
        /* ========= 核心UI样式 (增强批量下载提示 + 完全自适应卡片网格) ========= */
        body {

            font-family: system-ui, -apple-system, 'Segoe UI', 'Inter', Roboto, 'Helvetica Neue', sans-serif;

        .app-container {
            max-width: 1600px;

        .header-bar {

        .title-section h1 {

            background: linear-gradient(135deg, #1f5e7e, #3083a3);

        .btn-download-selected:hover {

        }
        .btn-add-group {

            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.85rem;

            gap: 8px;

        .btn-add-group:hover {
            background: #1f593a;
        }
        .selected-count {

            padding: 4px 14px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #1f6e8c;
            border: 1px solid #cbdbe0;
        }
        
        /* ========= 自适应网格布局: 使用 CSS Grid 完全响应式 ========= */
        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(460px, 1fr));
            gap: 1.5rem;
            padding: 0.2rem 0.2rem 1.8rem 0.2rem;
            align-items: start;
        }
        
        /* 中等屏幕适当缩小最小宽度，保证两栏舒服 */
        @media (max-width: 1000px) {
            .groups-grid {
                grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
                gap: 1.3rem;
            }
        }
        
        /* 平板: 依然两栏，但更灵活 */
        @media (max-width: 860px) {
            .groups-grid {
                grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            }
        }

        @media (max-width: 600px) {

                padding: 0.8rem 0.8rem;

            .groups-grid {

            flex-direction: column;
            transition: all 0.2s;
            border: 1px solid #e9edf2;

        .group-card:hover {

        .card-buttons {

        .btn-single-download {

            font-size: 0.7rem;

        .footer-tip {

        .toast-msg {

            .toast-msg {

                text-align: center;

            }

            }
            .contact-text {
                text-align: center;
                font-size: 0.75rem;
            }
        }
        .download-link-helper {
            display: none;
        }
    </style>

        let selectedCardsMap = new Map();
        
        function extractFileNameFromUrl(url, fallbackName) {
            if (!url || url === "#") return fallbackName;
            try {
                let urlObj;
                try {
                    urlObj = new URL(url);
                } catch(e) {
                    let pathPart = url.split('?')[0].split('#')[0];
                    let segments = pathPart.split('/');
                    let lastSegment = segments.pop() || fallbackName;
                    if (lastSegment.includes('.')) return decodeURIComponent(lastSegment);
                    return fallbackName;
                }
                let pathname = urlObj.pathname;
                let filename = pathname.split('/').pop();
                if (!filename || filename === "") return fallbackName;
                filename = filename.split('?')[0];
                if (filename.includes('.')) {
                    return decodeURIComponent(filename);
                } else {
                    return decodeURIComponent(filename) || fallbackName;
                }
            } catch (err) {
                return fallbackName;
            }
        }
        
        function downloadWithAnchorTag(url, suggestedName) {
            if (!url || url === "#") {
                showToast(`⚠️ 无效链接: ${suggestedName}`);
                return;
            }
            const finalFilename = extractFileNameFromUrl(url, suggestedName);
            showToast(`📄 正在下载: ${finalFilename} (若未开始请检查弹窗拦截)`, 3000);
            const anchor = document.createElement('a');
            anchor.href = url;
            anchor.target = '_blank';
            anchor.rel = 'noopener noreferrer';
            document.body.appendChild(anchor);
            anchor.click();
            setTimeout(() => {
                if (anchor.parentNode) anchor.parentNode.removeChild(anchor);
            }, 100);
        }
        
        function showToast(msg, duration = 2800) {
            let existingToast = document.querySelector('.toast-msg');
            if (existingToast) existingToast.remove();
            const toast = document.createElement('div');
            toast.className = 'toast-msg';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => { if(toast && toast.remove) toast.remove(); }, duration);
        }
        
        function batchDownloadSelected() {
            const selectedEntries = Array.from(selectedCardsMap.entries()).filter(([, selected]) => selected === true);
            if (selectedEntries.length === 0) {
                alert("未选中任何资源，请勾选卡片或使用分组的「全选本组」按钮。");
                return;
            }
            const downloadItems = [];
            for (const [cardId] of selectedEntries) {
                for (const group of groupsData) {
                    const foundCard = group.cards.find(c => c.id === cardId);
                    if (foundCard && foundCard.url && foundCard.url !== "#") {
                        downloadItems.push({ name: foundCard.name, url: foundCard.url });
                        break;
                    }
                }
            }
            if (downloadItems.length === 0) {
                alert("所选资源无有效下载链接");
                return;
            }
            let fileListPreview = downloadItems.map((item, idx) => {
                let extracted = extractFileNameFromUrl(item.url, item.name);
                return `${idx+1}. ${item.name} → ${extracted}`;
            }).join("\n");
            if (confirm(`即将打开 ${downloadItems.length} 个下载链接:\n${fileListPreview}\n\n⚠️ 请确保浏览器允许弹出窗口，是否继续？`)) {
                downloadItems.forEach((item, index) => {
                    setTimeout(() => { downloadWithAnchorTag(item.url, item.name); }, index * 180);
                });
                showToast(`📦 已触发 ${downloadItems.length} 个下载任务`, 4000);
            }
        }
        
        function updateSelectedCountUI() {
            const count = Array.from(selectedCardsMap.values()).filter(v => v === true).length;
            const badge = document.getElementById("selectedCountBadge");
            if (badge) badge.innerText = `已选 ${count} 项`;
        }
        
        function saveToLocalStorage() {
            try {
                localStorage.setItem("dynamic_groups_v6", JSON.stringify(groupsData));
            } catch(e) { console.warn(e); }
        }
        
        function rebuildSelectedMap() {
            const newMap = new Map();
            groupsData.forEach(group => {
                group.cards.forEach(card => {
                    newMap.set(card.id, selectedCardsMap.has(card.id) ? selectedCardsMap.get(card.id) : false);
                });
            });
            selectedCardsMap = newMap;
            updateSelectedCountUI();
        }
        
        function toggleSelectGroup(groupId, isSelectAll) {
            const group = groupsData.find(g => g.id === groupId);
            if (!group) return;
            group.cards.forEach(card => { selectedCardsMap.set(card.id, isSelectAll); });
            syncAllCheckboxStates();
            updateSelectedCountUI();
        }
        
        function syncAllCheckboxStates() {
            document.querySelectorAll('.resource-card-item').forEach(cardDiv => {
                const cardId = cardDiv.getAttribute('data-card-id');
                if (cardId && selectedCardsMap.has(cardId)) {
                    const isChecked = selectedCardsMap.get(cardId);
                    const checkbox = cardDiv.querySelector('.checkbox-select');
                    if (checkbox) checkbox.checked = isChecked;
                    if (isChecked) cardDiv.classList.add('selected');
                    else cardDiv.classList.remove('selected');
                }
            });
            groupsData.forEach(group => {
                const groupCardElem = document.querySelector(`.group-card[data-group-id="${group.id}"]`);
                if (groupCardElem) {
                    const selectAllBtn = groupCardElem.querySelector('.group-select-all');
                    if (selectAllBtn && group.cards.length > 0) {
                        const allSelected = group.cards.every(card => selectedCardsMap.get(card.id) === true);
                        selectAllBtn.innerHTML = allSelected ? '✅ 取消全选' : '☑️ 全选本组';
                        selectAllBtn.style.background = allSelected ? "#e0f0e8" : "#f0f5fa";
                    } else if (selectAllBtn && group.cards.length === 0) {
                        selectAllBtn.innerHTML = '📭 无卡片';
                        selectAllBtn.style.opacity = "0.5";
                    }
                }
            });
        }
        
        function onCardCheckboxChange(cardId, checked, cardElement) {
            selectedCardsMap.set(cardId, checked);
            if (checked) cardElement.classList.add('selected');
            else cardElement.classList.remove('selected');
            updateSelectedCountUI();
            const groupId = cardElement.closest('.group-card')?.getAttribute('data-group-id');
            if (groupId) {
                const group = groupsData.find(g => g.id === groupId);
                if (group) {
                    const groupCardElem = document.querySelector(`.group-card[data-group-id="${groupId}"]`);
                    if (groupCardElem) {
                        const selectAllBtn = groupCardElem.querySelector('.group-select-all');
                        if (selectAllBtn && group.cards.length) {
                            const allSelected = group.cards.every(card => selectedCardsMap.get(card.id) === true);
                            selectAllBtn.innerHTML = allSelected ? '✅ 取消全选' : '☑️ 全选本组';
                            selectAllBtn.style.background = allSelected ? "#e0f0e8" : "#f0f5fa";
                        }
                    }
                }
            }
        }
        
        function renderAllGroups() {
            const container = document.getElementById("groupsContainer");
            if (!container) return;
            container.innerHTML = "";
            if (groupsData.length === 0) {
                const emptyMsg = document.createElement("div");
                emptyMsg.style.background = "#fff9eb";
                emptyMsg.style.borderRadius = "28px";
                emptyMsg.style.padding = "2rem";
                emptyMsg.style.textAlign = "center";
                emptyMsg.innerHTML = "✨ 暂无分组，点击「新建分组」开始整理资源";
                container.appendChild(emptyMsg);
                return;
            }
            groupsData.forEach(group => {
                const groupCard = createGroupElement(group);
                container.appendChild(groupCard);
            });
            rebuildSelectedMap();
            syncAllCheckboxStates();
        }
        
        function createGroupElement(group) {
            const groupDiv = document.createElement("div");
            groupDiv.className = "group-card";
            groupDiv.setAttribute("data-group-id", group.id);
        
            const headerDiv = document.createElement("div");
            headerDiv.className = "group-header";
            const titleWrapper = document.createElement("div");
            titleWrapper.className = "group-title-wrapper";
            const titleInput = document.createElement("input");
            titleInput.type = "text";
            titleInput.value = group.title;
            titleInput.className = "group-title";
            titleInput.maxLength = 28;
            titleInput.addEventListener("blur", (e) => {
                let newVal = e.target.value.trim();
                if (newVal) group.title = newVal;
                else group.title = "未命名分组";
                titleInput.value = group.title;
                saveToLocalStorage();
                renderAllGroups();
            });
            titleInput.addEventListener("keypress", (e) => { if (e.key === "Enter") titleInput.blur(); });
            const editIcon = document.createElement("span");
            editIcon.innerHTML = "✏️";
            editIcon.className = "edit-icon";
            editIcon.addEventListener("click", () => { titleInput.focus(); titleInput.select(); });
            titleWrapper.appendChild(titleInput);
            titleWrapper.appendChild(editIcon);
        
            const selectAllBtn = document.createElement("button");
            selectAllBtn.className = "group-select-all";
            selectAllBtn.innerHTML = group.cards.length ? "☑️ 全选本组" : "📭 无卡片";
            if (!group.cards.length) selectAllBtn.style.opacity = "0.5";
            selectAllBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                if (!group.cards.length) return;
                const allSelected = group.cards.every(card => selectedCardsMap.get(card.id) === true);
                toggleSelectGroup(group.id, !allSelected);
                syncAllCheckboxStates();
            });
        
            const deleteGroupBtn = document.createElement("button");
            deleteGroupBtn.innerHTML = "🗑️";
            deleteGroupBtn.className = "btn-delete-group";
            deleteGroupBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                if (confirm(`确定删除分组「${group.title}」及其所有资源吗？`)) {
                    const idx = groupsData.findIndex(g => g.id === group.id);
                    if (idx !== -1) {
                        group.cards.forEach(card => selectedCardsMap.delete(card.id));
                        groupsData.splice(idx, 1);
                        renderAllGroups();
                        saveToLocalStorage();
                    }
                }
            });
            headerDiv.appendChild(titleWrapper);
            headerDiv.appendChild(selectAllBtn);
            headerDiv.appendChild(deleteGroupBtn);
        
            const cardsContainer = document.createElement("div");
            cardsContainer.className = "cards-container";
            function refreshCardsContainer() {
                cardsContainer.innerHTML = "";
                if (!group.cards.length) {
                    const emptyDiv = document.createElement("div");
                    emptyDiv.className = "empty-cards";
                    emptyDiv.innerText = "暂无资源，点击下方添加 ➕";
                    cardsContainer.appendChild(emptyDiv);
                } else {
                    group.cards.forEach(card => {
                        const cardElement = createCardElement(card, group.id);
                        cardsContainer.appendChild(cardElement);
                    });
                }
                const addBtn = document.createElement("button");
                addBtn.className = "add-card-btn";
                addBtn.innerHTML = "+ 添加新资源";
                addBtn.addEventListener("click", () => {
                    const newCardId = "card_" + Date.now() + "_" + Math.random().toString(36).substring(2, 6);
                    const newCard = { id: newCardId, name: "新资源", url: "https://example.com/download", officialUrl: "https://example.com" };
                    group.cards.push(newCard);
                    selectedCardsMap.set(newCardId, false);
                    refreshCardsContainer();
                    saveToLocalStorage();
                    rebuildSelectedMap();
                    syncAllCheckboxStates();
                });
                cardsContainer.appendChild(addBtn);
            }
            refreshCardsContainer();
            groupDiv.appendChild(headerDiv);
            groupDiv.appendChild(cardsContainer);
            return groupDiv;
        }
        
        function createCardElement(card, groupId) {
            const cardDiv = document.createElement("div");
            cardDiv.className = "resource-card-item";
            cardDiv.setAttribute("data-card-id", card.id);
            const rowTop = document.createElement("div");
            rowTop.className = "card-row-top";
            const leftDiv = document.createElement("div");
            leftDiv.className = "card-left";
            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.className = "checkbox-select";
            checkbox.checked = selectedCardsMap.get(card.id) || false;
            if (checkbox.checked) cardDiv.classList.add("selected");
            checkbox.addEventListener("change", (e) => onCardCheckboxChange(card.id, e.target.checked, cardDiv));
            const nameInput = document.createElement("input");
            nameInput.type = "text";
            nameInput.value = card.name;
            nameInput.className = "res-name";
            nameInput.addEventListener("blur", () => { card.name = nameInput.value.trim() || "未命名"; nameInput.value = card.name; saveToLocalStorage(); });
            nameInput.addEventListener("keypress", (e) => { if (e.key === "Enter") nameInput.blur(); });
            leftDiv.appendChild(checkbox);
            leftDiv.appendChild(nameInput);
            const btnGroup = document.createElement("div");
            btnGroup.className = "card-buttons";
            const downloadBtn = document.createElement("button");
            downloadBtn.className = "btn-single-download";
            downloadBtn.innerHTML = "⬇️ 下载";
            downloadBtn.addEventListener("click", (e) => { e.preventDefault(); downloadWithAnchorTag(card.url, card.name); });
            const removeBtn = document.createElement("button");
            removeBtn.innerHTML = "🗑️";
            removeBtn.className = "btn-remove-card";
            removeBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                const group = groupsData.find(g => g.id === groupId);
                if (group) {
                    const idx = group.cards.findIndex(c => c.id === card.id);
                    if (idx !== -1) { group.cards.splice(idx, 1); selectedCardsMap.delete(card.id); renderAllGroups(); saveToLocalStorage(); }
                }
            });
            btnGroup.appendChild(downloadBtn);
            btnGroup.appendChild(removeBtn);
            rowTop.appendChild(leftDiv);
            rowTop.appendChild(btnGroup);
            const rowUrl = document.createElement("div");
            rowUrl.className = "card-row-url";
            rowUrl.innerHTML = `<span class="url-label">📥 下载地址</span><input type="text" class="res-url" value="${escapeHtml(card.url)}" placeholder="下载链接">`;
            const urlInput = rowUrl.querySelector('.res-url');
            urlInput.addEventListener("blur", () => { card.url = urlInput.value.trim() || "#"; saveToLocalStorage(); });
            const rowOfficial = document.createElement("div");
            rowOfficial.className = "card-row-official";
            rowOfficial.innerHTML = `<span class="official-label">🌐 官网地址</span><input type="text" class="res-official" value="${escapeHtml(card.officialUrl || '')}" placeholder="官网链接"><a class="btn-official-link" href="${escapeHtml(card.officialUrl || '#')}" target="_blank">访问官网 ↗</a>`;
            const officialInput = rowOfficial.querySelector('.res-official');
            const officialLink = rowOfficial.querySelector('.btn-official-link');
            officialInput.addEventListener("blur", () => { let val = officialInput.value.trim(); if(val && !val.startsWith('http')) val = 'https://'+val; card.officialUrl = val || ''; officialLink.href = card.officialUrl || '#'; saveToLocalStorage(); });
            cardDiv.appendChild(rowTop);
            cardDiv.appendChild(rowUrl);
            cardDiv.appendChild(rowOfficial);
            return cardDiv;
        }
        
        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
        
        function addNewGroup() {
            const newGroupId = "grp_"+Date.now()+"_"+Math.random().toString(36).substring(2,5);
            const newCardId = "card_"+Date.now();
            groupsData.push({ id: newGroupId, title: "新分组", cards: [{ id: newCardId, name: "示例资源", url: "https://example.com/download", officialUrl: "https://example.com" }] });
            groupsData[groupsData.length-1].cards.forEach(c => selectedCardsMap.set(c.id, false));
            renderAllGroups();
            saveToLocalStorage();
        }
        
        function loadFromLocalStorage() {
            const stored = localStorage.getItem("dynamic_groups_v6");
            if (stored) {
                try { let parsed = JSON.parse(stored); if(Array.isArray(parsed)) groupsData = parsed;
                groupsData.forEach(g => { if(!g.id) g.id = "grp_"+Math.random(); g.cards.forEach(c => { if(!c.id) c.id="card_"+Math.random(); if(c.officialUrl===undefined) c.officialUrl=""; }); });
                } catch(e) {}
            }
            selectedCardsMap.clear();
            groupsData.forEach(g => g.cards.forEach(c => selectedCardsMap.set(c.id, false)));
            renderAllGroups();
        }
        
        // 新增强化复制功能: 支持两个p标签 与 contact模块
        function initCopyFeatures() {
            // 针对 contact-links 内按钮
            document.querySelectorAll('.copy-btn[data-copy-target]').forEach(btn => {
                btn.removeEventListener('click', handleCopyClick);
                btn.addEventListener('click', handleCopyClick);
            });
            // 针对纯p标签的复制按钮
            document.querySelectorAll('.copy-p-btn').forEach(btn => {
                btn.removeEventListener('click', handlePCopy);
                btn.addEventListener('click', handlePCopy);
            });
        }
        
        function handleCopyClick(e) {
            const targetId = e.currentTarget.getAttribute('data-copy-target');
            const sourceSpan = document.getElementById(targetId);
            if (sourceSpan) {
                let textToCopy = sourceSpan.innerText.trim();
                navigator.clipboard.writeText(textToCopy).then(() => {
                    showToast(`✅ 已复制: ${textToCopy.substring(0, 40)}`, 1600);
                }).catch(() => alert("手动复制失败"));
            }
        }
        
        function handlePCopy(e) {
            const pId = e.currentTarget.getAttribute('data-pid');
            const pElement = document.getElementById(pId);
            if (pElement) {
                let rawText = pElement.innerText.replace('📋 复制', '').trim();
                navigator.clipboard.writeText(rawText).then(() => {
                    showToast(`📋 复制成功: ${rawText.substring(0, 45)}`, 1500);
                }).catch(() => alert("无法复制"));
            }
        }
        
        window.initApp = function() {
            loadFromLocalStorage();
            document.getElementById("addGroupBtn")?.addEventListener("click", addNewGroup);
            document.getElementById("batchDownloadBtn")?.addEventListener("click", batchDownloadSelected);
            initCopyFeatures();
        };
    })();
